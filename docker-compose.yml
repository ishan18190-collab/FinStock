services:
  postgres:
    image: postgres:16
    container_name: ffa-postgres
    environment:
      POSTGRES_DB: financial_forensics
      POSTGRES_USER: ffa
      POSTGRES_PASSWORD: ffa
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ffa-redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    container_name: ffa-backend
    env_file:
      - ./backend/.env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://ffa:ffa@postgres:5432/financial_forensics
      REDIS_URL: redis://redis:6379/0
      PYTHONPATH: /app:/ai-engine/src
    volumes:
      - ./backend:/app
      - ./ai-engine:/ai-engine
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
    container_name: ffa-frontend
    env_file:
      - ./frontend/.env.example
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000
      INTERNAL_API_BASE: http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    ports:
      - "3000:3000"
    command: npm run dev -- --hostname 0.0.0.0 --port 3000

volumes:
  postgres_data:
